<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>SwitchBot Settings</title>
	<link rel="stylesheet" type="text/css" href="lwsa.css">
	<link rel="stylesheet" type="text/css" href="busy_indicator.css" />

	<style type="text/css">
		.fog_div {
			display: none;
			position: fixed;
			top: 0px;
			left: 0px;
			height: 100%;
			width: 100%;
			z-index: 100;
			background-color: rgba(30, 30, 30, 0.5);
		}

		#busybox.show {
			display: block;
		}

		.sim-log-tab-hidden {
			display: none;
		}

		.oauth-status-message {
			display: none;
			color: #ff6600;
			margin-bottom: 10px;
		}

		.oauth-login-button {
			display: none;
			background-color: #0066cc;
		}

		.debug-send-button {
			background-color: #0f9e16;
			color: #ffffff;
			margin: 5px 20px 5px 5px;
		}

		.debug-clear-button {
			background-color: #a5510d;
			color: #ffffff;
			margin: 5px 20px 5px 5px;
		}

		.detected-actions {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
			align-items: center;
		}
	</style>

	<!-- The '/homey.js' script must be included in your settings view to work -->
	<script type="text/javascript" src="/homey.js" data-origin="settings"></script>
	<script type="text/javascript" src="busy_indicator.js"></script>
</head>

<body>
	<!-- Busy indicator -->
	<div id="busybox" class="fog_div">
		<div></div>
	</div>

	<!-- Tab links -->
	<div class="tab">
		<button class="tablinks" onclick="setPage(event, 'appSettings')" id="appSettingsTab" data-i18n="settings.tabAppSettings" title="settings.tabAppSettings"></button>
		<button class="tablinks" onclick="setPage(event, 'detected')" id="defaultOpen" data-i18n="settings.tabDetected" title="settings.tabDetected"></button>
		<button class="tablinks" onclick="setPage(event, 'log')" data-i18n="settings.tabLog" title="settings.tabLog"></button>
		<button class="tablinks" onclick="setPage(event, 'status')" id="deviceStatusTab" data-i18n="settings.tabGetStatus" title="settings.tabGetStatus"></button>
		<button class="tablinks" onclick="setPage(event, 'oldSettings')" id="oldSettingsTab" data-i18n="settings.tabOldSettings" title="settings.tabOldSettings"></button>
		<button class="tablinks sim-log-tab-hidden" onclick="setPage(event, 'simulator')" id="simLogTab" data-i18n="settings.tabSimulationData" title="settings.tabSimulationData"></button>
	</div>

	<!--APP SETTINGS PAGE -->
	<div id="appSettings" class="tabcontent">
		<fieldset>
			<div class="field row">
				<label class="homey-form-label" for="numConnections"><span data-i18n="settings.numConnections"></span></label>
				<input class="homey-form-input" id="numConnections" type="number" min="1" value="1" title="Number of connections" aria-label="Number of connections" />
			</div>
			<p></p>
			<p>
				<button id="saveAppSettings" class="homey-button-small" data-i18n="settings.save" title="settings.save"></button>
			</p>
		</fieldset>
	</div>

	<!-- detected-->
	<div id="detected" class="tabcontent">
		<fieldset>
			<p id="oAuthStatusMessage" class="oauth-status-message">
				<strong data-i18n="settings.oauthMissingSessionTitle"></strong> <span data-i18n="settings.oauthMissingSessionText"></span>
			</p>
			<p class="detected-actions">
				<button id="loginWithOAuth" class="homey-button-small oauth-login-button" data-i18n="settings.loginWithSwitchBot" title="Login with SwitchBot Account"></button>
				<button id="getDeviceLog" class="homey-button-small" data-i18n="settings.getDevices" title="Get HUB Devices"></button>
				<button id="clearDeviceLog" class="homey-button-small" data-i18n="settings.clear" title="Clear Log"></button>
				<button id="sendDeviceLog" class="homey-button-small" data-i18n="settings.send" title="Send Log"></button>
			</p>
			<div class="field row">
				<textarea id="detectedDevices" class="homey-form-textarea" wrap="off" title="Detected devices"></textarea>
			</div>
		</fieldset>
	</div>

	<!-- LOG PAGE -->
	<div id="log" class="tabcontent">
		<fieldset>
			<p><span data-i18n="settings.diagnosticsLog"></span>
			</p>
			<div class="field row">
				<label class="homey-form-label" for="logLevel"><span data-i18n="settings.logLevel"></span></label>
				<select class="homey-form-select" id="logLevel" title="Log level" aria-label="Log level">
					<option value=0 data-i18n="settings.logErrorsOnly"></option>
					<option value=1 data-i18n="settings.logWebhookInfo"></option>
					<option value=2 data-i18n="settings.logBasicInfo"></option>
					<option value=3 data-i18n="settings.logDetailedInfo"></option>
					<option value=4 data-i18n="settings.logFullInfo"></option>
				</select>
				<P></P>
			</div>
			<div class="field row">
				<label class="homey-form-label" for="logSource"><span data-i18n="settings.logSource"></span></label>
				<select class="homey-form-select" id="logSource" title="Log source" aria-label="Log source">
					<option value="all" data-i18n="settings.logSourceAll"></option>
					<option value="ble" data-i18n="settings.logSourceBLE"></option>
					<option value="hub" data-i18n="settings.logSourceHub"></option>
				</select>
				<P></P>
			</div>
			<p>
				<button id="clearInfoLog" class="homey-button-small" data-i18n="settings.clear" title="Clear Log"></button>
				<button id="sendInfoLog" class="homey-button-small" data-i18n="settings.send" title="Send Log"></button>
			</p>
			<div class="field row">
				<textarea id="infoLog" class="homey-form-textarea" wrap="off" title="Diagnostics log"></textarea>
			</div>
		</fieldset>
	</div>

	<!--SEND COMMAND PAGE -->
	<div id="send" class="tabcontent">
		<fieldset>
			<h1 data-i18n="settings.forDebugUseOnly"></h1>
			<p><input id="commandData" type="text" value="" title="settings.commandData" aria-label="settings.commandData" /><button id="sendCmd"
					class="debug-send-button" data-i18n="settings.send" title="settings.send"></button><button
					id="clearSend" class="debug-clear-button" data-i18n="settings.clear" title="settings.clear"></button></p>
			<div class="field row">
				<textarea id="sendResponse" class="homey-form-textarea" wrap="off" title="Send command response"></textarea>
			</div>
		</fieldset>
	</div>

	<!--SIMULATION PAGE -->
	<div id="simulator" class="tabcontent">
		<fieldset>
			<h1 data-i18n="settings.forDebugUseOnly"></h1>
			<p><button id="useSim" class="homey-button-small" data-i18n="settings.activate" title="settings.activate"></button><button id="clearSim"
					class="debug-clear-button" data-i18n="settings.clearSim" title="settings.clearSim"></button></p>
			<div class="field row">
				<textarea id="simData" class="homey-form-textarea" wrap="off" title="Simulation data"></textarea>
			</div>
		</fieldset>
	</div>

	<!--DEVICE GET STATUS PAGE -->
	<div id="status" class="tabcontent">
		<fieldset>
			<h1 data-i18n="settings.forDebugUseOnly"></h1>
			<div class="field row">
				<label class="homey-form-label" for="deviceID" data-i18n="settings.deviceId"></label>
				<input class="homey-form-input" id="deviceID" type="text" value="" title="settings.deviceId" aria-label="settings.deviceId" />
			</div>
			<p></p>
			<p>
				<button id="readStatus" class="homey-button-small" data-i18n="settings.readStatus" title="settings.readStatus"></button>
				<button id="clearStatusLog" class="homey-button-small" data-i18n="settings.clear" title="settings.clear"></button>
				<button id="sendStatusLog" class="homey-button-small" data-i18n="settings.send" title="settings.send"></button>
			</p>
			<div class="field row">
				<textarea id="statusData" class="homey-form-textarea" wrap="off" title="Device status log"></textarea>
			</div>
		</fieldset>
	</div>

	<!--OLD SETTINGS PAGE -->
	<div id="oldSettings" class="tabcontent">
		<fieldset>
			<h1 data-i18n="settings.forDebugUseOnly"></h1>
			<div class="field row">
				<label class="homey-form-label" for="openToken" data-i18n="settings.openToken"></label>
				<input class="homey-form-input" id="openToken" type="text" value="" title="settings.openToken" aria-label="settings.openToken" />
			</div>
			<div class="field row">
				<label class="homey-form-label" for="openSecret" data-i18n="settings.openSecret"></label>
				<input class="homey-form-input" id="openSecret" type="text" value="" title="settings.openSecret" aria-label="settings.openSecret" />
			</div>
			<p></p>
			<p>
				<button id="saveSettings" class="homey-button-small" data-i18n="settings.save" title="settings.save"></button>
			</p>
		</fieldset>
	</div>

	<script type="text/javascript">
		// Create the busy indicator
		var busyi;
		busyi = new busy_indicator(document.getElementById("busybox"), document.querySelector("#busybox div"));

		var detectedDevicesElement = document.getElementById('detectedDevices');
		var infoLogElement = document.getElementById('infoLog');
		var logLevelElement = document.getElementById('logLevel');
		var logSourceElement = document.getElementById('logSource');
		var clearInfoLogElement = document.getElementById('clearInfoLog');
		var sendInfoLogElement = document.getElementById('sendInfoLog');

		var getDeviceLogElement = document.getElementById('getDeviceLog');
		var clearDeviceLogElement = document.getElementById('clearDeviceLog');
		var sendDeviceLogElement = document.getElementById('sendDeviceLog');
		var loginWithOAuthElement = document.getElementById('loginWithOAuth');
		var oAuthStatusMessageElement = document.getElementById('oAuthStatusMessage');

		function setOAuthUiState(hasOAuthSession)
		{
			if (hasOAuthSession)
			{
				oAuthStatusMessageElement.style.display = 'none';
				loginWithOAuthElement.style.display = 'none';
				getDeviceLogElement.style.display = 'inline-block';
				clearDeviceLogElement.style.display = 'inline-block';
				sendDeviceLogElement.style.display = 'inline-block';
			}
			else
			{
				oAuthStatusMessageElement.style.display = 'block';
				loginWithOAuthElement.style.display = 'inline-block';
				getDeviceLogElement.style.display = 'none';
				clearDeviceLogElement.style.display = 'none';
				sendDeviceLogElement.style.display = 'none';
			}
		}

		// Simulation log tab
		var useSimElement = document.getElementById('useSim');
		var clearSimElement = document.getElementById('clearSim');
		var simDataElement = document.getElementById('simData');

		// Get device status tab
		var deviceIDElement = document.getElementById('deviceID');
		var readStatusElement = document.getElementById('readStatus');
		var statusDataElement = document.getElementById('statusData');
		var sendStatusLogElement = document.getElementById('sendStatusLog');
		var clearStatusLogElement = document.getElementById('clearStatusLog');

		// Old settings tab
		var openTokenIDElement = document.getElementById('openToken');
		var openSecretElement = document.getElementById('openSecret');
		var saveSettingsElement = document.getElementById('saveSettings');

		// App settings tab
		var numConnectionsElement = document.getElementById('numConnections');
		var saveAppSettingsElement = document.getElementById('saveAppSettings');

		// Function to check OAuth status
		function checkOAuthStatus(Homey)
		{
			Homey.api('GET', '/checkOAuthStatus/', {}, function (err, result)
			{
				if (err)
				{
					console.error('OAuth check error:', err);
					setOAuthUiState(false);
					return;
				}

				if (result && result.hasOAuthSession)
				{
					setOAuthUiState(true);
				}
				else
				{
					setOAuthUiState(false);
				}
			});
		}

		// a method named 'onHomeyReady' must be present in your code
		function onHomeyReady(Homey)
		{
			const t = (key, fallback) => {
				const value = Homey.__(key);
				return value === key ? fallback : value;
			};

			const localizeA11yPlaceholders = () => {
				document.querySelectorAll('[title^="settings."]').forEach((element) => {
					const key = element.getAttribute('title');
					element.setAttribute('title', t(key, key));
				});

				document.querySelectorAll('[aria-label^="settings."]').forEach((element) => {
					const key = element.getAttribute('aria-label');
					element.setAttribute('aria-label', t(key, key));
				});
			};

			// Tell Homey we're ready to be displayed
			Homey.ready();

			// Ensure placeholder accessibility labels are localized at runtime.
			localizeA11yPlaceholders();

			// Check OAuth status
			checkOAuthStatus(Homey);

			Homey.get('debugMode', function (err, debugMode)
			{
				if (err) return Homey.alert(err);
				if (debugMode)
				{
					document.getElementById("simLogTab").style.display = "block";
				}
			});

			document.getElementById("defaultOpen").click();

			Homey.api('GET', '/getLog/',
				{
					notify: true
				}, function (err, result)
			{
				if (err)
				{
					Homey.alert(err);
				}
				else
				{
					infoLogElement.value = result;
				}
			});

			Homey.on('com.switchbot.logupdated', function (data)
			{
				infoLogElement.value = data.log;
			});

			Homey.on('com.switchbot.detectedDevicesUpdated', function (data)
			{
				detectedDevicesElement.value = data.devices;
			});

			Homey.get('logLevel', function (err, logLevel)
			{
				if (err) return Homey.alert(err);
				logLevelElement.value = logLevel.toString();
			});

			Homey.get('logSource', function (err, logSource)
			{
				if (err) return Homey.alert(err);
				logSourceElement.value = logSource || 'all';
			});

			Homey.get('numConnections', function (err, numConnections)
			{
				if (err) return Homey.alert(err);
				numConnectionsElement.value = numConnections;
			});

			logLevelElement.addEventListener('change', function (e)
			{
				Homey.set('logLevel', parseInt(logLevelElement.value), function (err)
				{
					if (err) return Homey.alert(err);
				});
			});

			logSourceElement.addEventListener('change', function (e)
			{
				Homey.set('logSource', logSourceElement.value, function (err)
				{
					if (err) return Homey.alert(err);
				});
			});

			loginWithOAuthElement.addEventListener('click', function (e)
			{
				waitCursor(true);
				Homey.api('GET', '/startOAuth2Flow/', {}, function (err, result)
				{
					waitCursor(false);

					if (err || !result || !result.authUrl)
					{
						Homey.alert(t('settings.oauthLoginStartError', 'Error initiating login. Please try again. If this persists, check your OAuth2 client configuration.'));
						return;
					}

					// Use Homey.openURL to open the OAuth callback URL in the actual browser (outside settings webview)
					Homey.openURL(result.authUrl);

					// After user completes OAuth, check status periodically
					Homey.alert(t('settings.oauthLoginOpened', 'A browser window has opened with the SwitchBot login page. After login, return here. The Get HUB devices button will be available once authenticated.'));

					// Give user time to complete OAuth, then start checking
					setTimeout(() => {
						checkOAuthStatus(Homey);
					}, 3000);

					// Keep checking every 5 seconds for up to 5 minutes
					const maxAttempts = 60;
					let attempts = 0;
					const checkInterval = setInterval(() => {
						attempts++;
						if (attempts >= maxAttempts)
						{
							clearInterval(checkInterval);
							return;
						}
						checkOAuthStatus(Homey);
					}, 5000);
				});
			});

			getDeviceLogElement.addEventListener('click', function (e)
			{
				// Check OAuth status first
				Homey.api('GET', '/checkOAuthStatus/', {}, function (err, result)
				{
					if (err || (result && !result.hasOAuthSession))
					{
						Homey.alert(t('settings.oauthLoginRequiredFirst', 'Please log in with your SwitchBot account first by clicking the Login with SwitchBot Account button.'));
						oAuthStatusMessageElement.style.display = 'block';
						loginWithOAuthElement.style.display = 'block';
						return;
					}

					waitCursor(true);
					Homey.api('GET', '/getDetect/',
						{
							notify: true,
							hubDevices: true
						}, function (err, result)
					{
						if (err)
						{
							Homey.alert(err);
						}
						else
						{
							detectedDevicesElement.value = result;
						}
						waitCursor(false);
					});
				});
			});

			clearDeviceLogElement.addEventListener('click', function (e)
			{
				Homey.set('detectedDevices', "", function (err)
				{
					if (err) return Homey.alert(err);
				});
				detectedDevicesElement.value = "";
			});

			sendDeviceLogElement.addEventListener('click', function (e)
			{
				if (detectedDevicesElement.value.length < 15)
				{
					return Homey.alert(t('settings.noDataToSend', 'No Data to send'));
				}
				Homey.confirm(t('settings.confirmSendDeviceLog', 'Send the device log contents to the developer?'), null, function (e, ok)
				{
					if (ok)
					{
						waitCursor(true);
						Homey.api('POST', '/SendDeviceLog/',
							{
								notify: true
							}, function (err, result)
						{
							if (err)
							{
								Homey.alert(err);
							}
							else
							{
								Homey.alert(t('settings.logSentSuccessfully', 'Log sent successfully'));
							}
							waitCursor(false);
						});
					}
				});
			});

			sendInfoLogElement.addEventListener('click', function (e)
			{
				if (infoLogElement.value.length < 15)
				{
					return Homey.alert(t('settings.noDataToSend', 'No Data to send'));
				}

				Homey.confirm(t('settings.confirmSendInfoLog', 'Send the information log contents to the developer?'), null, function (e, ok)
				{
					if (ok)
					{
						waitCursor(true);
						Homey.api('POST', '/sendInfoLog/',
							{
								notify: true
							}, function (err, result)
						{
							if (err)
							{
								Homey.alert(err);
							}
							else
							{
								Homey.alert(t('settings.logSentSuccessfully', 'Log sent successfully'));
							}
							waitCursor(false);
						});
					}
				});
			});

			clearInfoLogElement.addEventListener('click', function (e)
			{
				Homey.api('POST', '/clearLog/',
					{
						notify: true
					}, function (err, result)
				{
					if (err)
					{
						return Homey.alert(err);
					}
					else
					{
						infoLogElement.value = "";
					}
				});
			});

			useSimElement.addEventListener('click', function (e)
			{
				try
				{
					Homey.set('simData', simDataElement.value, function (err)
					{
						if (err)
						{
							Homey.alert(err);
						}
						else
						{
							Homey.alert(t('settings.simulatorOn', 'Simulator On'));
						}
					});
				}
				catch (err)
				{
					return Homey.alert(err);
				}
			});

			clearSimElement.addEventListener('click', function (e)
			{
				Homey.set('simData', "", function (err)
				{
					if (err)
					{
						return Homey.alert(err);
					}
					else
					{
						return Homey.alert(t('settings.simulatorOff', 'Simulator Off'));
					}
				});
			});

			readStatusElement.addEventListener('click', function (e)
			{
				Homey.api('POST', '/requestDeviceStatus/?deviceId=' + deviceIDElement.value, {}, function (err, result)
				{
					if (err)
					{
						return Homey.alert(err);
					}
					else
					{
						statusDataElement.value = result;
					}
				});
			});

			clearStatusLogElement.addEventListener('click', function (e)
			{
				Homey.api('POST', '/clearStatusLog/',
					{
						notify: true
					}, function (err, result)
				{
					if (err)
					{
						return Homey.alert(err);
					}
					else
					{
						statusDataElement.value = "";
					}
				});
			});

			sendStatusLogElement.addEventListener('click', function (e)
			{
				if (statusDataElement.value.length < 15)
				{
					return Homey.alert(t('settings.noDataToSend', 'No Data to send'));
				}

				Homey.confirm(t('settings.confirmSendStatusLog', 'Send the status log contents to the developer?'), null, function (e, ok)
				{
					if (ok)
					{
						waitCursor(true);
						Homey.api('POST', '/sendStatusLog/',
							{
								notify: true
							}, function (err, result)
						{
							if (err)
							{
								Homey.alert(err);
							}
							else
							{
								Homey.alert(t('settings.logSentSuccessfully', 'Log sent successfully'));
							}
							waitCursor(false);
						});
					}
				});
			});

			saveSettingsElement.addEventListener('click', function (e)
			{
				Homey.set('openToken', openTokenIDElement.value, function (err)
				{
					if (err)
					{
						return Homey.alert(err);
					}
				});

				Homey.set('openSecret', openSecretElement.value, function (err)
				{
					if (err)
					{
						return Homey.alert(err);
					}
				});
			});

			saveAppSettingsElement.addEventListener('click', function (e)
			{
				Homey.set('numConnections', parseInt(numConnectionsElement.value), function (err)
				{
					if (err)
					{
						return Homey.alert(err);
					}
				});
			});
		}

		function setPage(evt, tabPage)
		{
			var i, tabcontent, tablinks;

			// Get all elements with class="tabcontent" and hide them
			tabcontent = document.getElementsByClassName("tabcontent");
			for (i = 0; i < tabcontent.length; i++)
			{
				tabcontent[i].style.display = "none";
			}

			// Get all elements with class="tablinks" and remove the class "active"
			tablinks = document.getElementsByClassName("tablinks");
			for (i = 0; i < tablinks.length; i++)
			{
				tablinks[i].className = tablinks[i].className.replace(" active", "");
			}

			// Show the current tab, and add an "active" class to the button that opened the tab
			document.getElementById(tabPage).style.display = "block";
			evt.currentTarget.className += " active";

			if (tabPage == 'log')
			{
				// Refresh the log data
				Homey.get('logLevel', function (err, logLevel)
				{
					if (err) return Homey.alert(err);
					logLevelElement.value = logLevel;
				});

				// Make the log text area fill the page
				infoLogElement.style.width = (logLevelElement.offsetWidth) + 'px';
				infoLogElement.style.height = (window.innerHeight - infoLogElement.offsetTop - 60) + 'px';
			}
			else if (tabPage == 'detected')
			{
				// Make the detected devices text area fill the page
				detectedDevicesElement.setAttribute('cols', detectedDevicesElement.parentElement.clientWidth / 8);
				detectedDevicesElement.style.height = (window.innerHeight - detectedDevicesElement.offsetTop - 60) + 'px';
			}
			else if (tabPage == 'simulator')
			{
				Homey.get('simData', function (err, simData)
				{
					if (err) return Homey.alert(err);
					simDataElement.value = simData ? simData : "";
				});
				// Make the simulator text box fill the page
				simDataElement.setAttribute('cols', simDataElement.parentElement.clientWidth / 8);
				simDataElement.style.height = (window.innerHeight - simDataElement.offsetTop - 60) + 'px';
			}
			else if (tabPage == 'status')
			{
				// Make the detected devices text area fill the page
				statusDataElement.style.width = (deviceIDElement.offsetWidth) + 'px';
				statusDataElement.style.height = (window.innerHeight - statusDataElement.offsetTop - 60) + 'px';
			}
			else if (tabPage == 'oldSettings')
			{
				Homey.get('openToken', function (err, openToken)
				{
					if (err) return Homey.alert(err);
					openTokenIDElement.value = openToken;
				});

				Homey.get('openSecret', function (err, openSecret)
				{
					if (err) return Homey.alert(err);
					openSecretElement.value = openSecret;
				});
			}
			else if (tabPage == 'appSettings')
			{
				Homey.get('numConnections', function (err, numConnections)
				{
					if (err) return Homey.alert(err);
					numConnectionsElement.value = numConnections;
				});
			}
		}

		function waitCursor(On)
		{
			if (On)
			{
				busyi.show();
			}
			else
			{
				busyi.hide();
			}
		}
	</script>

</body>

</html>

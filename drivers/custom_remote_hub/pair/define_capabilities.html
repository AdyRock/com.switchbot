<style type="text/css">
    .pair-form {
        text-align: left;
    }

    .pair-buttons-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
    }

    .pair-submit {
        margin: 15px;
        padding: 10px;
        text-align: center;
        color: #ffffff;
        background-color: rgb(15, 170, 36);
        border-radius: 5px;
        border: 0;
        cursor: pointer;
    }
</style>

<br />
<p data-i18n="pair.button_code.instructions" class="pair-form"></p>
<br />

<form id="form" name="form" action="javascript:void(0);" method="post" class="pair-form">
    <div class="form-group">
        <div id="buttonsContainer" class="pair-buttons-grid"></div>
        <input type="submit" id="submit" class="pair-submit" data-i18n="settings.save" value="Save" />
    </div>
</form>

<script type="text/javascript">
    Homey.setTitle(__('pair.button_code.title'));

    const BUTTON_COUNT = 36;
    const formElement = document.getElementById('form');
    const submitElement = document.getElementById('submit');
    const buttonsContainerElement = document.getElementById('buttonsContainer');

    for (let index = 1; index <= BUTTON_COUNT; index++)
    {
        const id = `button${index}`;
        const i18nKey = `pair.button_code.${id}`;
        const labelText = __(i18nKey);

        const labelElement = document.createElement('label');
        labelElement.setAttribute('for', id);
        labelElement.textContent = labelText;

        const inputElement = document.createElement('input');
        inputElement.type = 'text';
        inputElement.name = id;
        inputElement.id = id;
        inputElement.value = '';
        inputElement.setAttribute('title', labelText);
        inputElement.setAttribute('aria-label', labelText);

        buttonsContainerElement.appendChild(labelElement);
        buttonsContainerElement.appendChild(inputElement);
    }

    formElement.addEventListener('submit', function getForm(event)
    {
        event.preventDefault();

        // Mark as authenticating.
        submitElement.disabled = true;

        const buttons = Array.from({ length: BUTTON_COUNT }, function (_, index)
        {
            const value = document.getElementById(`button${index + 1}`).value;
            return typeof value === 'string' ? value.trim() : value;
        });

        Homey.emit('set_buttons', { buttons: buttons })
            .then(function (result)
            {
                if (!result)
                {
                    submitElement.disabled = false;
                    return;
                }

                return Homey.createDevice(result)
                    .then(function ()
                    {
                        Homey.done();
                    })
                    .catch(function (err)
                    {
                        submitElement.disabled = false;
                        return Homey.alert(err.message);
                    });
            })
            .catch(function (err)
            {
                submitElement.disabled = false;
                return Homey.alert(err.message);
            });
    });
</script>
